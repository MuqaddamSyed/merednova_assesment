name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml numpy python-dotenv

      - name: Lint (compile)
        run: python -m compileall -q src tests

      - name: Run fast tests
        run: PYTHONPATH=. pytest tests/test_router.py tests/test_context.py tests/test_terminal.py tests/test_metrics.py tests/test_pipeline.py -v
